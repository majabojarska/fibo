name: Lint
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # History is required by gitleaks
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install dependencies
        run: go get -u -t -v ./...

      - name: Swag fmt
        run: swag fmt

      - name: Assert 'swag fmt' made no diff
        run: |
          if [[ `git status --porcelain` ]]; then
            git diff
            echo "Swag fmt generated a diff. Run 'swag fmt' locally to correct swag annotation formatting."
            exit 1
          else
            echo "Swag fmt made no changes"
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
